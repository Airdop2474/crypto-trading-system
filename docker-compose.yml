version: '3.8'

# TODO: Use Docker secrets or *_FILE variants for production
# - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_password
# - TIMESCALE_PASSWORD_FILE=/run/secrets/timescale_password

# Docker 日志轮转全局默认（各服务可覆盖）
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  timescaledb:
    image: timescale/timescaledb:2.17.0-pg16
    container_name: crypto_trading_db
    logging: *default-logging
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_trading}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./config/sql:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: crypto_trading_redis
    logging: *default-logging
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana-oss:10.4.12
    container_name: crypto_trading_grafana
    logging: *default-logging
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-crypto_trading}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - timescaledb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "--timeout=3", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 交易系统主服务
  trading_system:
    build: .
    container_name: crypto_trading_app
    logging: *default-logging
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@timescaledb:${POSTGRES_PORT:-5432}/crypto_trading
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:${REDIS_PORT:-6379}/0
      TIMESCALE_HOST: timescaledb
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000

  # Paper Trading 守护进程（自动重启）
  paper_daemon:
    build: .
    container_name: crypto_trading_paper_daemon
    logging: *default-logging
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@timescaledb:${POSTGRES_PORT:-5432}/crypto_trading
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:${REDIS_PORT:-6379}/0
      TIMESCALE_HOST: timescaledb
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    command: python scripts/run_paper_trading_daemon.py --days 60
    # 不设 ports —— 守护进程不需要对外暴露端口
    # 通过 checkpoint 文件（data/paper_daemon_state.json）实现崩溃恢复

volumes:
  timescaledb_data:
  redis_data:
  grafana_data:

networks:
  default:
    name: crypto_trading_network
