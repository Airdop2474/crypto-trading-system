name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: 代码规范检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          pip install black isort flake8 mypy
          pip install -r requirements.txt

      - name: Black 格式检查
        run: black --check src/

      - name: isort 导入排序检查
        run: isort --check-only src/

      - name: Flake8 代码检查
        run: flake8 src/ --max-line-length=100

      - name: MyPy 类型检查
        run: mypy src/ --ignore-missing-imports

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: crypto_trading_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 运行测试
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/crypto_trading_test
          REDIS_URL: redis://localhost:6379/0
          LIVE_TRADING_ENABLED: false
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=term

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: 安全检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 检查敏感信息泄露
        uses: gitleaks/gitleaks-action@v2

      - name: 依赖安全检查
        run: |
          pip install safety
          safety check -r requirements.txt

  docs:
    name: 文档检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 检查必需文档
        run: |
          test -f docs/collaboration/CONTRIBUTING.md || exit 1
          test -f docs/planning/FINAL_PLAN_APPROVED.md || exit 1
          test -f docs/planning/ROADMAP_UPDATE.md || exit 1
          test -f .env.example || exit 1
          echo "✅ 所有必需文档存在"

      - name: 检查 .env 未提交
        run: |
          if [ -f .env ]; then
            echo "❌ .env 文件不应该提交到 Git"
            exit 1
          fi
          echo "✅ .env 文件未提交"
